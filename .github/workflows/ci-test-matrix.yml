name: CI - Test Matrix

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'

permissions: {}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: [18.x, 20.x, 22.x, 24.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies on Node.js-v18
        if: matrix.node == '18.x'
        run: |
          jq --arg version "4.0.18" '(.devDependencies //= {}) | .devDependencies["@vitest/coverage-v8"] = $version | .devDependencies["@vitest/ui"] = $version | .devDependencies["vitest"] = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

          npm install

      - name: Install dependencies
        if: matrix.node != '18.x'
        run: |
          npm ci

      - name: Build
        run: |
          npm run build

      - name: Test
        run: |
          npm run test
